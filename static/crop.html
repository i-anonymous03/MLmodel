<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Cropper - Taaranaa</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Cropper.js CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .cropper-container-wrapper {
            margin: 2rem 0;
            max-height: 450px;
            overflow: hidden;
            border-radius: 16px;
            background: rgba(0,0,0,0.2);
            display: none;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            padding: 10px;
        }
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
        }
        .action-buttons button {
            flex: 1;
        }
        .nav-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
            font-size: 1.1rem;
        }
        .nav-link:hover {
            color: var(--accent);
        }
        .preview-result {
            margin-top: 2rem;
            display: none;
            text-align: center;
            animation: popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .preview-result img {
            max-width: 100%;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 2px solid var(--primary);
        }
    </style>
</head>
<body>
    <canvas id="antigravity-canvas"></canvas>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container glass-panel">
        <a href="index.html" class="nav-link">← Back to Scanner</a>
        <header>
            <h1>Image <span>Cropper</span></h1>
            <p class="subtitle">Prepare images before analysis</p>
        </header>

        <main>
            <div class="upload-zone" id="uploadZone">
                <input type="file" id="fileInput" accept="image/jpeg, image/png, image/jpg" hidden>
                <div class="upload-content" id="uploadContent">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="upload-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <p>Drag & Drop an image here</p>
                    <span>or click to browse</span>
                </div>
            </div>

            <div class="cropper-container-wrapper" id="cropperWrapper">
                <img id="imageToCrop" style="max-width: 100%; display: block;">
            </div>

            <div class="action-buttons hidden" id="actionButtons">
                <button class="toggle-btn" id="cropBtn"><span>Crop & Download</span></button>
                <button class="toggle-btn" id="resetBtn" style="background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.4);"><span>Cancel</span></button>
            </div>

            <div class="preview-result" id="previewResult">
                <h2>Cropped Result</h2>
                <br>
                <img id="croppedPreview" alt="Cropped Result">
            </div>
        </main>
    </div>

    <!-- Cropper.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const cropperWrapper = document.getElementById('cropperWrapper');
        const imageToCrop = document.getElementById('imageToCrop');
        const actionButtons = document.getElementById('actionButtons');
        const cropBtn = document.getElementById('cropBtn');
        const resetBtn = document.getElementById('resetBtn');
        const previewResult = document.getElementById('previewResult');
        const croppedPreview = document.getElementById('croppedPreview');

        let cropper = null;

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                imageToCrop.src = e.target.result;
                uploadZone.classList.add('hidden');
                cropperWrapper.style.display = 'block';
                actionButtons.classList.remove('hidden');
                previewResult.style.display = 'none';
                
                if (cropper) {
                    cropper.destroy();
                }
                
                // Initialize cropper after image is loaded to avoid dimension issues
                imageToCrop.onload = () => {
                    cropper = new Cropper(imageToCrop, {
                        aspectRatio: NaN, // Free aspect ratio
                        viewMode: 1, // Restrict the crop box to not exceed the size of the canvas
                        background: false,
                        zoomable: true,
                    });
                };
            };
            reader.readAsDataURL(file);
        }

        cropBtn.addEventListener('click', () => {
            if (!cropper) return;
            
            const canvas = cropper.getCroppedCanvas({
                imageSmoothingEnabled: true,
                imageSmoothingQuality: 'high',
            });
            if (!canvas) return;

            // Show preview
            croppedPreview.src = canvas.toDataURL('image/jpeg');
            previewResult.style.display = 'block';

            // Download automatically
            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'taaranaa_cropped.jpg';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 'image/jpeg', 0.95);
        });

        resetBtn.addEventListener('click', () => {
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }
            uploadZone.classList.remove('hidden');
            cropperWrapper.style.display = 'none';
            actionButtons.classList.add('hidden');
            fileInput.value = '';
            previewResult.style.display = 'none';
        });
    </script>
</body>
</html>
